<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Oogway - Sabiduría</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo específico para la frase de Oogway */
        .frase-celebre {
            font-size: 24px;
            font-style: italic;
            color: #555;
            margin-top: 30px;
        }

        /* Estilo para que la imagen sea responsive (no se salga en el móvil) */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px; /* Bordes suaves para la imagen */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); /* Sombra para que resalte */
            display: block;
            margin: 30px auto;
        }
    </style>
</head>

<body>
    <h1>Maestro Oogway</h1>

    <img src="maestro-oogway.jpg" alt="Maestro Oogway" width="700">

    <p class="frase-celebre">
        “El ayer es historia, el mañana es un misterio y el hoy es un regalo, por eso se llama presente”
    </p>

    <p style="text-align: center;">
        <a href="index.html">← Volver a la página principal</a>
    </p>

</body>

</html>
